name: Update Panel Data

on:
  schedule:
    # 北京时间 11:00 和 13:30 (UTC+8 → UTC)
    - cron: '0 3 * * 1-5'
    - cron: '30 5 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Run update script
        run: python3 update_data.py
      
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "auto: update data.json $(date +'%Y-%m-%d %H:%M')"
          git push
