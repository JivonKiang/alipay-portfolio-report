name: Build Android APK & OTA Bundle

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build OTA Update Bundle
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Building OTA bundle v$VERSION"
          mkdir -p updates
          cd www
          zip -r "../updates/bundle-${VERSION}.zip" .
          cd ..
          CHECKSUM=$(sha256sum "updates/bundle-${VERSION}.zip" | awk '{print $1}')
          echo "Checksum: $CHECKSUM"
          cat > updates/updates.json << EOF
          {
            "version": "${VERSION}",
            "url": "https://jivonkiang.github.io/alipay-portfolio-report/updates/bundle-${VERSION}.zip",
            "checksum": "${CHECKSUM}",
            "message": "OTA update v${VERSION}"
          }
          EOF
          cat updates/updates.json

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle.log
        shell: bash

      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: /tmp/gradle.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

      - name: Upload OTA Bundle
        uses: actions/upload-artifact@v4
        with:
          name: ota-bundle
          path: updates/
          if-no-files-found: warn

      - name: Commit OTA updates to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add updates/
          git diff --cached --quiet || git commit -m "chore: update OTA bundle v$(node -p "require('./package.json').version")"
          git push || echo "Nothing to push"

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            updates/bundle-*.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
