name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Debug Environment
        run: |
          echo "=== JAVA ==="
          java -version
          echo "=== ANDROID_HOME ==="
          echo "$ANDROID_HOME"
          echo "=== SDK directories ==="
          ls -la "$ANDROID_HOME/" 2>/dev/null || echo "ANDROID_HOME not accessible"
          echo "=== Platforms ==="
          ls "$ANDROID_HOME/platforms/" 2>/dev/null || echo "no platforms dir"
          echo "=== Build Tools ==="
          ls "$ANDROID_HOME/build-tools/" 2>/dev/null || echo "no build-tools dir"
          echo "=== Gradle ==="
          ls -la android/gradlew
          echo "=== android dir ==="
          ls -la android/

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle.log
        shell: bash

      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: /tmp/gradle.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}