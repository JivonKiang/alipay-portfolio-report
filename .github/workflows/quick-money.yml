name: Quick Money Hourly Scan

on:
  schedule:
    # 北京时间 9:00-15:00 每个整点 (UTC+8 → UTC+0: 1-7)
    - cron: '0 1,2,3,4,5,6,7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run quick money scan
        run: python quick_money.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add quick_money.json cache/
          if git diff --staged --quiet; then
            echo "No changes, skipping commit"
          else
            git commit -m "快钱模块数据更新 [$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')]"
            git push
          fi
