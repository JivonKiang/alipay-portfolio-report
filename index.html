<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0b0f19">
  <title>Jivon 综合资产面板</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0b0f19;
      --bg-elevated: #111827;
      --bg-card: #1a2236;
      --bg-card-hover: #232d45;
      --border: #1f2937;
      --text: #f1f5f9;
      --text-dim: #94a3b8;
      --text-muted: #64748b;
      --green: #22c55e;
      --green-dim: rgba(34,197,94,0.12);
      --red: #ef4444;
      --red-dim: rgba(239,68,68,0.12);
      --blue: #3b82f6;
      --blue-dim: rgba(59,130,246,0.12);
      --purple: #a855f7;
      --purple-dim: rgba(168,85,247,0.12);
      --orange: #f97316;
      --orange-dim: rgba(249,115,22,0.12);
      --yellow: #eab308;
      --yellow-dim: rgba(234,179,8,0.12);
      --radius: 16px;
      --radius-sm: 12px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      -webkit-font-smoothing: antialiased; overflow-x: hidden;
      padding-bottom: calc(60px + var(--safe-bottom));
    }

    /* Header */
    .app-header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(11,15,25,0.92); backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border); padding: 10px 16px;
    }
    .app-header-inner { display: flex; align-items: center; justify-content: space-between; }
    .app-header h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
    .app-header .subtitle { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

    /* Tab Bar */
    .tab-bar {
      display: flex; gap: 4px; padding: 8px 16px;
      background: var(--bg-elevated); border-bottom: 1px solid var(--border);
      overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    .tab-btn {
      padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
      white-space: nowrap; border: 1px solid var(--border); background: transparent;
      color: var(--text-dim); transition: all 0.2s; cursor: pointer;
    }
    .tab-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

    /* Content */
    .content { padding: 12px 16px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Cards */
    .card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
    }
    .card-title {
      font-size: 14px; font-weight: 600; color: var(--text-dim);
      margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
    }

    /* Signal dot */
    .signal-dot {
      width: 10px; height: 10px; border-radius: 50%; display: inline-block;
    }
    .signal-dot.buy { background: var(--green); box-shadow: 0 0 8px rgba(34,197,94,0.5); }
    .signal-dot.watch { background: var(--yellow); box-shadow: 0 0 8px rgba(234,179,8,0.5); }
    .signal-dot.avoid { background: var(--red); box-shadow: 0 0 8px rgba(239,68,68,0.5); }
    .signal-dot.dca { background: var(--blue); box-shadow: 0 0 8px rgba(59,130,246,0.5); }

    /* MA distance bar */
    .ma-bar-wrap { margin: 10px 0; }
    .ma-bar-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .ma-bar {
      height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; position: relative;
    }
    .ma-bar-fill {
      height: 100%; border-radius: 3px; transition: width 0.6s ease;
    }
    .ma-bar-fill.above { background: var(--green); }
    .ma-bar-fill.below { background: var(--red); }
    .ma-bar-fill.neutral { background: var(--yellow); }
    .ma-bar-marker {
      position: absolute; top: -4px; width: 12px; height: 14px;
      border-radius: 3px; transform: translateX(-50%);
    }
    .ma-bar-marker.green { background: var(--green); }
    .ma-bar-marker.red { background: var(--red); }
    .ma-bar-marker.yellow { background: var(--yellow); }

    /* Fund link */
    .fund-link {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; background: rgba(255,255,255,0.03);
      border-radius: 8px; margin-top: 8px; border: 1px solid var(--border);
    }
    .fund-link:active { background: var(--bg-card-hover); }
    .fund-code { font-size: 11px; color: var(--text-muted); }
    .fund-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .fund-note { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

    /* Action card */
    .action-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
      border-left: 3px solid var(--blue);
    }
    .action-card.priority-1 { border-left-color: var(--red); }
    .action-card.priority-2 { border-left-color: var(--orange); }
    .action-card.priority-3 { border-left-color: var(--yellow); }
    .action-card.priority-4 { border-left-color: var(--blue); }
    .action-priority {
      font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; margin-bottom: 6px; display: inline-block;
    }
    .action-priority.p1 { background: var(--red-dim); color: var(--red); }
    .action-priority.p2 { background: var(--orange-dim); color: var(--orange); }
    .action-priority.p3 { background: var(--yellow-dim); color: var(--yellow); }
    .action-priority.p4 { background: var(--blue-dim); color: var(--blue); }
    .action-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .action-detail { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; line-height: 1.5; }
    .action-path {
      font-size: 11px; color: var(--blue); background: var(--blue-dim);
      padding: 6px 10px; border-radius: 6px; display: inline-block;
    }

    /* Hero stats */
    .hero-stats {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;
    }
    .hero-stat {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; position: relative; overflow: hidden;
    }
    .hero-stat::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--blue), var(--purple)); opacity: 0.6;
    }
    .hero-stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .hero-stat-value { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }

    /* Chart */
    .chart-wrap { max-width: 100%; margin: 8px 0; }
    canvas { max-width: 100%; }

    /* Trigger condition */
    .trigger-box {
      background: rgba(249,115,22,0.06); border: 1px solid rgba(249,115,22,0.2);
      border-radius: 8px; padding: 10px 12px; margin-top: 10px;
      font-size: 11px; color: var(--orange);
    }
    .trigger-box .trigger-label { font-weight: 600; margin-bottom: 4px; font-size: 10px; text-transform: uppercase; }

    /* Summary stats row */
    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px;
    }
    .mini-stat {
      text-align: center; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 12px 8px;
    }
    .mini-stat-value { font-size: 16px; font-weight: 700; }
    .mini-stat-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

    @media (max-width: 360px) {
      .hero-stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="app-header">
  <div class="app-header-inner">
    <div>
      <h1>Jivon 综合资产面板</h1>
      <div class="subtitle" id="updateTime">加载中...</div>
    </div>
  </div>
</div>

<!-- Tab Bar -->
<div class="tab-bar" id="tabBar">
  <button class="tab-btn active" onclick="switchTab('overview')">总览</button>
  <button class="tab-btn" onclick="switchTab('sectors')">板块信号</button>
  <button class="tab-btn" onclick="switchTab('nasdaq')">纳指</button>
  <button class="tab-btn" onclick="switchTab('actions')">今日操作</button>
</div>

<!-- Content -->
<div class="content">

  <!-- Overview Tab -->
  <div class="tab-panel active" id="panel-overview">
    <div class="hero-stats">
      <div class="hero-stat">
        <div class="hero-stat-label">存量总资产</div>
        <div class="hero-stat-value" style="color:var(--blue)" id="totalAsset">--</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-label">纳指(昨收)</div>
        <div class="hero-stat-value" style="color:var(--green)" id="ndxPrice">--</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">配置结构</div>
      <div class="stats-row" id="allocationRow"></div>
    </div>

    <div class="card">
      <div class="card-title">板块信号速览</div>
      <div id="signalOverview"></div>
    </div>
  </div>

  <!-- Sectors Tab -->
  <div class="tab-panel" id="panel-sectors">
    <div id="sectorCards"></div>
  </div>

  <!-- Nasdaq Tab -->
  <div class="tab-panel" id="panel-nasdaq">
    <div class="card">
      <div class="card-title">纳指走势 & 定投信号</div>
      <div class="chart-wrap"><canvas id="ndxChart" height="220"></canvas></div>
      <div class="stats-row" style="margin-top:12px">
        <div class="mini-stat">
          <div class="mini-stat-value" style="color:var(--green)" id="ndxMa20">--</div>
          <div class="mini-stat-label">MA20</div>
        </div>
        <div class="mini-stat">
          <div class="mini-stat-value" style="color:var(--blue)" id="ndxMa20Dir">--</div>
          <div class="mini-stat-label">MA20方向</div>
        </div>
        <div class="mini-stat">
          <div class="mini-stat-value" style="color:var(--orange)" id="ndxDrawdown">--</div>
          <div class="mini-stat-label">距60日高</div>
        </div>
      </div>
      <div id="ndxFunds" style="margin-top:8px"></div>
    </div>
  </div>

  <!-- Actions Tab -->
  <div class="tab-panel" id="panel-actions">
    <div id="actionCards"></div>
  </div>
</div>

<script>
// ==================== Data Loading ====================
let DATA = null;

async function loadData() {
  try {
    const resp = await fetch('data.json');
    DATA = await resp.json();
    renderAll();
  } catch(e) {
    document.getElementById('updateTime').textContent = '数据加载失败';
    console.error(e);
  }
}

// ==================== Render ====================
function renderAll() {
  document.getElementById('updateTime').textContent = '更新于 ' + DATA.updated.replace('T',' ').slice(0,16);

  // Overview
  const p = DATA.portfolio;
  document.getElementById('totalAsset').textContent = '≈' + (p.total/10000).toFixed(0) + '万';
  document.getElementById('ndxPrice').textContent = DATA.nasdaq.ndx_price.toLocaleString();

  // Allocation
  const allocRow = document.getElementById('allocationRow');
  const allocs = [
    {label:'稳健理财', val: p.steady, color:'var(--green)'},
    {label:'灵活取用', val: p.flexible, color:'var(--blue)'},
    {label:'进阶理财', val: p.growth, color:'var(--orange)'}
  ];
  allocRow.innerHTML = allocs.map(a => `
    <div class="mini-stat">
      <div class="mini-stat-value" style="color:${a.color}">${(a.val/10000).toFixed(1)}万</div>
      <div class="mini-stat-label">${a.label}</div>
    </div>
  `).join('');

  // Signal overview
  renderSignalOverview();
  // Sector cards
  renderSectorCards();
  // Nasdaq
  renderNasdaq();
  // Actions
  renderActions();
}

function renderSignalOverview() {
  const sectors = DATA.sectors;
  const html = Object.entries(sectors).map(([key, s]) => {
    const dotClass = s.signal;
    return `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
        <div>
          <span class="signal-dot ${dotClass}"></span>
          <span style="font-size:13px;font-weight:500;margin-left:8px">${s.name}</span>
          <span style="font-size:11px;color:var(--text-muted);margin-left:6px">${s.change_pct > 0 ? '+' : ''}${s.change_pct}%</span>
        </div>
        <span style="font-size:11px;color:var(--text-dim)">${s.signal_text.split('（')[0]}</span>
      </div>
    `;
  }).join('');
  document.getElementById('signalOverview').innerHTML = html;
}

function renderSectorCards() {
  const sectors = DATA.sectors;
  const html = Object.entries(sectors).map(([key, s]) => {
    // MA10 distance bar
    let barPercent, barColor, markerColor;
    if (s.distance_ma10 === -1 || isNaN(s.distance_ma10)) {
      barPercent = 50; barColor = 'neutral'; markerColor = 'yellow';
    } else if (s.distance_ma10 > 0) {
      barPercent = Math.min(50 + Math.abs(s.distance_ma10) * 5, 95);
      barColor = 'above'; markerColor = 'green';
    } else {
      barPercent = Math.max(50 - Math.abs(s.distance_ma10) * 5, 5);
      barColor = 'below'; markerColor = 'red';
    }
    const distText = s.distance_ma10 === -1 ? '数据缺失' : (s.distance_ma10 > 0 ? `+${s.distance_ma10}%` : `${s.distance_ma10}%`);

    // Fund links
    const fundsHtml = s.funds.map(f => `
      <div class="fund-link">
        <div>
          <div class="fund-code">${f.code}</div>
          <div class="fund-name">${f.name}</div>
          <div class="fund-note">${f.note}</div>
        </div>
      </div>
    `).join('');

    // Trigger
    const triggerHtml = s.action.trigger ? `
      <div class="trigger-box">
        <div class="trigger-label">买入触发条件</div>
        ${s.action.trigger}
      </div>
    ` : '';

    return `
    <div class="card">
      <div class="card-title">
        <span class="signal-dot ${s.signal}"></span>
        ${s.name} · ${s.index}
        <span style="font-size:12px;color:${s.change_pct>=0?'var(--green)':'var(--red)'};margin-left:auto">
          ${s.change_pct>0?'+':''}${s.change_pct}%
        </span>
      </div>
      <div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">${s.signal_text}</div>
      ${s.distance_ma10 !== -1 ? `
      <div class="ma-bar-wrap">
        <div class="ma-bar-label"><span>MA10 参考</span><span>距10日线: ${distText}</span></div>
        <div class="ma-bar" style="position:relative">
          <div class="ma-bar-fill ${barColor}" style="width:${barPercent}%"></div>
        </div>
      </div>
      ` : ''}
      ${s.volume_ratio ? `<div style="font-size:11px;color:var(--text-muted);margin-bottom:8px">成交额: 前日${(s.volume_ratio*100).toFixed(0)}% ${s.volume_ratio < 0.7 ? '(缩量)' : '(放量)'}</div>` : ''}

      <div style="font-size:12px;font-weight:600;color:var(--text-dim);margin:10px 0 6px">推荐基金</div>
      ${fundsHtml}

      <div style="margin-top:10px;padding:8px 10px;background:var(--bg-elevated);border-radius:8px;font-size:12px">
        <span style="color:var(--text-dim)">操作: </span>
        <span style="font-weight:600;color:var(--text)">${s.action.detail}</span>
        ${s.action.path ? `<div style="color:var(--blue);font-size:10px;margin-top:3px">${s.action.path}</div>` : ''}
      </div>
      ${triggerHtml}
    </div>
    `;
  }).join('');
  document.getElementById('sectorCards').innerHTML = html;
}

function renderNasdaq() {
  const ndx = DATA.nasdaq;
  document.getElementById('ndxMa20').textContent = ndx.ma20.toLocaleString();
  document.getElementById('ndxMa20Dir').textContent = ndx.ma20_direction === 'up' ? '↑ 向上' : '↓ 向下';
  document.getElementById('ndxMa20Dir').style.color = ndx.ma20_direction === 'up' ? 'var(--green)' : 'var(--red)';
  document.getElementById('ndxDrawdown').textContent = '-' + ndx.drawdown_pct.toFixed(1) + '%';

  // Fund links
  const fundsHtml = ndx.funds.map(f => `
    <div class="fund-link">
      <div>
        <div class="fund-code">${f.code}</div>
        <div class="fund-name">${f.name}</div>
        <div class="fund-note">${f.note}</div>
      </div>
    </div>
  `).join('');
  document.getElementById('ndxFunds').innerHTML = `
    <div style="font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:8px">
      <span class="signal-dot ${ndx.signal}"></span> ${ndx.signal_text}
    </div>
    <div style="font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:4px">定投基金</div>
    ${fundsHtml}
  `;

  // Chart placeholder (data needs to be injected from real cache)
  const ctx = document.getElementById('ndxChart').getContext('2d');
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: Array.from({length:20}, (_,i) => 'D-' + (20-i)),
      datasets: [{
        label: '纳指',
        data: Array(20).fill(ndx.ndx_price * 0.95).map((v,i,a) => v + (ndx.ndx_price * 0.05) * (i/a.length)),
        borderColor: '#22c55e',
        backgroundColor: 'rgba(34,197,94,0.05)',
        fill: true, tension: 0.3, pointRadius: 0
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { display: false },
        y: { display: true, grid: { color: '#1f2937' }, ticks: { color: '#64748b', font: { size: 10 } } }
      }
    }
  });
}

function renderActions() {
  const actions = DATA.today_actions;
  const html = actions.map((a, i) => `
    <div class="action-card priority-${a.priority}">
      <span class="action-priority p${a.priority}">优先级 ${a.priority}</span>
      <div class="action-title">${a.title}</div>
      <div class="action-detail">${a.detail}</div>
      ${a.path ? `<div class="action-path">${a.path}</div>` : ''}
    </div>
  `).join('');
  document.getElementById('actionCards').innerHTML = html;
}

// ==================== Tab Switch ====================
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  event.target.classList.add('active');
}

// ==================== Init ====================
loadData();
</script>
</body>
</html>
